name: AnkiStudio
options:
  bundleIdPrefix: com.ankistudio
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  YouTubeKit:
    url: https://github.com/alexeichhorn/YouTubeKit
    from: 0.2.0
targets:
  AnkiStudio:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: YouTubeKit
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Anki Studio
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        # No custom crypto — skips App Store Connect's export-compliance prompt.
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - ZenKakuGothicNew-Regular.ttf
          - ZenKakuGothicNew-Medium.ttf
          - ZenKakuGothicNew-Bold.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yannickherrero.ankistudio
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: KY6RHJR4LZ
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
